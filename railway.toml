# =============================================================================
# Sloth Jobs — Railway Deployment Configuration
# =============================================================================
# Deploy: Connect this repo to Railway → it auto-detects this config.
# Volume: Mount a persistent volume at /app/data in the Railway dashboard.
# Env vars: Set in Railway dashboard (LLM_API_KEY, BASIC_AUTH_USER, etc.)
# Public URL: https://sloth-jobs-production.up.railway.app

[build]
# Use the existing multi-stage Dockerfile
dockerfilePath = "Dockerfile"

[deploy]
# Health check — Railway uses this to verify the service is alive
healthcheckPath = "/health"
healthcheckTimeout = 30

# Restart on crash
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Let the Dockerfile CMD handle startup (WORKDIR is already /app/orchestrator)
# Railway executes startCommand as a raw executable, not through a shell,
# so shell builtins like `cd` don't work. The Dockerfile CMD uses sh -c instead.
